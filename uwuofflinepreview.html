<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UwU线下美化预览</title>
<style>
:root {
  --bg:#f5f4f0;--bg-panel:#edecea;--bg-input:#ffffff;--border:#d8d6d0;
  --text:#2c2b28;--text-muted:#8a8880;--preview-bg:#ffffff;
  --shadow:0 1px 4px rgba(0,0,0,0.08);
}
[data-theme="dark"] {
  --bg:#1a1a18;--bg-panel:#222220;--bg-input:#2a2a28;--border:#3a3a38;
  --text:#e0deda;--text-muted:#686660;--preview-bg:#222220;
  --shadow:0 1px 4px rgba(0,0,0,0.3);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;background:var(--bg);color:var(--text);transition:background .25s,color .25s}

.qaq-header{position:sticky;top:0;z-index:100;background:var(--bg-panel);border-bottom:1px solid var(--border);padding:0 14px;height:48px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow)}
.qaq-logo span{font-weight:400;font-size:13px;color:var(--text-muted)}
.qaq-header-right{display:flex;align-items:center;gap:6px}

.qaq-btn{background:var(--bg-input);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s;-webkit-appearance:none}
.qaq-btn.active{background:var(--text);color:var(--bg-input)}

.qaq-notice{overflow:hidden;max-height:0;transition:max-height .25s ease;background:var(--bg-panel);border-bottom:1px solid var(--border)}
.qaq-notice.open{max-height:140px}
.qaq-notice-inner{padding:10px 14px 13px;font-size:12px;color:var(--text-muted);line-height:1.8}

.qaq-block{border-bottom:1px solid var(--border)}
.qaq-block-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--bg-panel);border-bottom:1px solid var(--border);position:sticky;top:48px;z-index:10}
.qaq-block-title{font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--text-muted);text-transform:uppercase}
.qaq-block-actions{display:flex;align-items:center;gap:6px}

/* tab 栏 */
.qaq-tabs{display:none;padding:0 14px;background:var(--bg-panel);border-bottom:1px solid var(--border);gap:0;overflow-x:auto;white-space:nowrap}
.qaq-tabs.show{display:flex}
.qaq-tab{padding:8px 12px;font-size:12px;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;flex-shrink:0;transition:all .15s}
.qaq-tab.active{color:var(--text);border-bottom-color:var(--text)}

textarea{display:block;width:100%;background:var(--bg-input);border:none;outline:none;resize:none;padding:12px 14px;font-size:12.5px;font-family:"Menlo","Courier New",monospace;color:var(--text);line-height:1.7;transition:background .25s,height .2s ease;min-height:160px}
textarea.expanded{height:calc(100vh - 48px)!important;min-height:unset}
textarea::placeholder{color:var(--text-muted)}

.qaq-status{display:flex;align-items:center;gap:6px;padding:5px 14px;background:var(--bg-panel);border-top:1px solid var(--border);font-size:11px;color:var(--text-muted)}
.qaq-dot{width:5px;height:5px;border-radius:50%;background:#a0b090;flex-shrink:0}

.qaq-preview-body{background:var(--preview-bg);padding:20px 14px;min-height:200px;transition:background .25s}
.message-wrapper{display:flex;justify-content:flex-start}
.message-bubble{max-width:92%;background:var(--bg-panel);border-radius:12px;padding:14px 16px;color:var(--text);font-size:14px;line-height:1.8;box-shadow:var(--shadow)}

/* 弹窗 */
.qaq-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.4);align-items:center;justify-content:center}
.qaq-overlay.active{display:flex}
.qaq-modal{background:var(--bg-panel);border:1px solid var(--border);border-radius:12px;width:calc(100% - 40px);max-width:340px;box-shadow:0 4px 24px rgba(0,0,0,0.18);overflow:hidden}
.qaq-modal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border)}
.qaq-modal-title{font-size:13px;font-weight:600;color:var(--text)}
.qaq-modal-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px}

.qaq-option-btn{background:var(--bg-input);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:12px 14px;font-size:13px;cursor:pointer;text-align:left;width:100%;-webkit-appearance:none}
.qaq-option-btn b{display:block;margin-bottom:2px}
.qaq-option-btn span{font-size:11px;color:var(--text-muted);display:block}

.qaq-modal-input{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:13px;color:var(--text);outline:none;font-family:inherit;-webkit-appearance:none}
.qaq-modal-input::placeholder{color:var(--text-muted)}
.qaq-modal-footer{display:flex;gap:8px;justify-content:flex-end}

.qaq-preset-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto}
.qaq-preset-item{display:flex;align-items:center;justify-content:space-between;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:10px 12px;gap:8px}
.qaq-preset-name{font-size:13px;font-weight:600;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qaq-preset-date{font-size:11px;color:var(--text-muted);margin-top:2px}
.qaq-preset-actions{display:flex;gap:6px;flex-shrink:0}
.qaq-preset-empty{font-size:12px;color:var(--text-muted);text-align:center;padding:20px 0}

/* 气泡面板 */
.qaq-bubble-row{display:flex;align-items:center;gap:8px}
.qaq-bubble-label{font-size:12px;color:var(--text-muted);width:60px;flex-shrink:0}
.qaq-bubble-row input[type="color"]{width:32px;height:26px;border:1px solid var(--border);border-radius:4px;padding:1px;background:var(--bg-input);cursor:pointer;-webkit-appearance:none}
.qaq-bubble-row input[type="range"]{flex:1;height:4px;-webkit-appearance:none;background:var(--border);border-radius:2px;outline:none}
.qaq-bubble-row input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--text);cursor:pointer}
.qaq-bubble-val{font-size:11px;color:var(--text-muted);width:28px;text-align:right;flex-shrink:0}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<header class="qaq-header">
  <div class="qaq-logo"><span>UwU线下美化预览</span></div>
  <div class="qaq-header-right">
    <button class="qaq-btn" id="exampleBtn">范例</button>
    <button class="qaq-btn" id="clearBtn">清空</button>
    <button class="qaq-btn" id="saveBtn">保存</button>
    <button class="qaq-btn" id="modeBtn">模板</button>
    <button class="qaq-btn" id="noticeBtn">须知</button>
    <button class="qaq-btn" id="themeBtn">夜间</button>
  </div>
</header>

<div class="qaq-notice" id="notice">
  <div class="qaq-notice-inner">
    UwU线下模式美化预览工具<br>作者：qaq<br>
    依旧是方便本人使用而肘击出来的小工具。<br>
    请不要把别人的代码用到本工具里。<br>
    严禁二改、擦边、模仿、抄袭等一切行为。<br>
    请尊重她人劳动成果。
  </div>
</div>

<!-- CSS 模块 -->
<div class="qaq-block" id="cssBlock">
  <div class="qaq-block-header">
    <span class="qaq-block-title">CSS</span>
    <div class="qaq-block-actions">
      <button class="qaq-btn" id="importCssBtn">导入</button>
      <button class="qaq-btn" id="expandCssBtn">展开</button>
      <button class="qaq-btn" id="clearCssBtn">清空</button>
    </div>
  </div>
  <div class="qaq-tabs" id="cssTabs">
    <div class="qaq-tab active" data-tab="env">环境</div>
    <div class="qaq-tab" data-tab="act">动作</div>
    <div class="qaq-tab" data-tab="mind">心理</div>
    <div class="qaq-tab" data-tab="talk">对话</div>
    <div class="qaq-tab" data-tab="custom">自定义</div>
  </div>
  <textarea id="cssInput" placeholder="在这里贴入 CSS 代码……" spellcheck="false"></textarea>
</div>

<!-- HTML 模块 -->
<div class="qaq-block" id="htmlBlock">
  <div class="qaq-block-header">
    <span class="qaq-block-title">HTML</span>
    <div class="qaq-block-actions">
      <button class="qaq-btn" id="importHtmlBtn">导入</button>
      <button class="qaq-btn" id="expandHtmlBtn">展开</button>
      <button class="qaq-btn" id="clearHtmlBtn">清空</button>
    </div>
  </div>
  <div class="qaq-tabs" id="htmlTabs">
    <div class="qaq-tab active" data-tab="env">环境</div>
    <div class="qaq-tab" data-tab="act">动作</div>
    <div class="qaq-tab" data-tab="mind">心理</div>
    <div class="qaq-tab" data-tab="talk">对话</div>
    <div class="qaq-tab" data-tab="custom">自定义</div>
  </div>
  <textarea id="htmlInput" placeholder="在这里贴入 HTML 文案……" spellcheck="false"></textarea>
  <div class="qaq-status">
    <div class="qaq-dot"></div>
    <span id="statusText">等待输入</span>
  </div>
</div>

<!-- 预览模块 -->
<div class="qaq-block">
  <div class="qaq-block-header">
    <span class="qaq-block-title">预览</span>
    <div class="qaq-block-actions">
      <button class="qaq-btn" id="bubbleBtn">气泡</button>
      <span style="font-size:11px;color:var(--text-muted)">实时渲染</span>
    </div>
  </div>
  <div class="qaq-preview-body">
    <div class="message-wrapper">
      <div class="message-bubble" id="previewBubble">
        <p style="color:var(--text-muted);font-size:13px;">贴入内容后这里实时显示效果。</p>
      </div>
    </div>
  </div>
</div>

<!-- 保存弹窗 -->
<div class="qaq-overlay" id="saveOverlay">
  <div class="qaq-modal">
    <div class="qaq-modal-header">
      <span class="qaq-modal-title" id="saveModalTitle">保存预设</span>
      <button class="qaq-btn" id="saveCloseBtn">×</button>
    </div>
    <div class="qaq-modal-body" id="saveModalBody"></div>
  </div>
</div>

<!-- 导入弹窗 -->
<div class="qaq-overlay" id="importOverlay">
  <div class="qaq-modal">
    <div class="qaq-modal-header">
      <span class="qaq-modal-title" id="importModalTitle">导入预设</span>
      <button class="qaq-btn" id="importCloseBtn">×</button>
    </div>
    <div class="qaq-modal-body" id="importModalBody"></div>
  </div>
</div>

<!-- 气泡弹窗 -->
<div class="qaq-overlay" id="bubbleOverlay">
  <div class="qaq-modal">
    <div class="qaq-modal-header">
      <span class="qaq-modal-title">气泡样式</span>
      <button class="qaq-btn" id="bubbleCloseBtn">×</button>
    </div>
    <div class="qaq-modal-body" id="bubbleModalBody">
      <div class="qaq-bubble-row">
        <span class="qaq-bubble-label">内里颜色</span>
        <input type="color" id="bblBgColor" value="#edecea">
      </div>
      <div class="qaq-bubble-row">
        <span class="qaq-bubble-label">内里透明</span>
        <input type="range" id="bblBgAlpha" min="0" max="100" value="100">
        <span class="qaq-bubble-val" id="bblBgAlphaVal">100</span>
      </div>
      <div class="qaq-bubble-row">
        <span class="qaq-bubble-label">边框颜色</span>
        <input type="color" id="bblBdColor" value="#d8d6d0">
      </div>
      <div class="qaq-bubble-row">
        <span class="qaq-bubble-label">边框粗细</span>
        <input type="range" id="bblBdWidth" min="0" max="6" value="0" step="0.5">
        <span class="qaq-bubble-val" id="bblBdWidthVal">0</span>
      </div>
      <div class="qaq-bubble-row">
        <span class="qaq-bubble-label">边框透明</span>
        <input type="range" id="bblBdAlpha" min="0" max="100" value="100">
        <span class="qaq-bubble-val" id="bblBdAlphaVal">100</span>
      </div>
      <div style="margin-top:4px">
        <span class="qaq-bubble-label" style="display:block;margin-bottom:6px;width:auto">自定义 CSS</span>
        <textarea id="bblCustomCss" style="min-height:60px;font-size:11.5px" placeholder=".message-bubble { ... }"></textarea>
      </div>
      <div class="qaq-modal-footer">
        <button class="qaq-btn" id="bblResetBtn">重置</button>
      </div>
    </div>
  </div>
</div>

<style id="qaq-injected-style"></style>
<style id="qaq-bubble-style"></style>

<script>
(function(){
  var $=function(id){return document.getElementById(id)};
  var cssInput=$('cssInput'),htmlInput=$('htmlInput');
  var styleTag=$('qaq-injected-style'),bubbleStyle=$('qaq-bubble-style');
  var bubble=$('previewBubble'),statusText=$('statusText');
  var noticeOpen=false,isDark=false;
  var KEYS={css:'qaq_presets_css',html:'qaq_presets_html'};

  /* ---- 模板模式 ---- */
  var isTabMode=false;
  var TAB_KEYS=['env','act','mind','talk','custom'];
  var TAB_NAMES={env:'环境',act:'动作',mind:'心理',talk:'对话',custom:'自定义'};
  var cssTabData={env:'',act:'',mind:'',talk:'',custom:''};
  var htmlTabData={env:'',act:'',mind:'',talk:'',custom:''};
  var curCssTab='env',curHtmlTab='env';

  /* ---- 渲染 ---- */
  function render(){
    if(isTabMode){
      var allCss='';
      TAB_KEYS.forEach(function(k){allCss+=cssTabData[k]+'\n';});
      styleTag.textContent=allCss;
      var allHtml='';
      TAB_KEYS.forEach(function(k){allHtml+=htmlTabData[k];});
      if(allHtml.trim()){
        bubble.innerHTML=allHtml;
        statusText.textContent='已渲染';
      } else {
        bubble.innerHTML='<p style="color:var(--text-muted);font-size:13px;">贴入内容后这里实时显示效果。</p>';
        statusText.textContent='等待输入';
      }
    } else {
      styleTag.textContent=cssInput.value;
      if(htmlInput.value.trim()){
        bubble.innerHTML=htmlInput.value;
        statusText.textContent='已渲染';
      } else {
        bubble.innerHTML='<p style="color:var(--text-muted);font-size:13px;">贴入内容后这里实时显示效果。</p>';
        statusText.textContent='等待输入';
      }
    }
  }
  cssInput.addEventListener('input',function(){
    if(isTabMode) cssTabData[curCssTab]=cssInput.value;
    render();
  });
  htmlInput.addEventListener('input',function(){
    if(isTabMode) htmlTabData[curHtmlTab]=htmlInput.value;
    render();
  });

  /* ---- tab 切换 ---- */
  function bindTabs(containerId,type){
    $(containerId).addEventListener('click',function(e){
      var tab=e.target.closest('.qaq-tab');
      if(!tab) return;
      var key=tab.getAttribute('data-tab');
      this.querySelectorAll('.qaq-tab').forEach(function(t){t.classList.remove('active');});
      tab.classList.add('active');
      if(type==='css'){
        cssTabData[curCssTab]=cssInput.value;
        curCssTab=key;
        cssInput.value=cssTabData[key];
        cssInput.placeholder='CSS — '+TAB_NAMES[key]+'……';
      } else {
        htmlTabData[curHtmlTab]=htmlInput.value;
        curHtmlTab=key;
        htmlInput.value=htmlTabData[key];
        htmlInput.placeholder='HTML — '+TAB_NAMES[key]+'……';
      }
    });
  }
  bindTabs('cssTabs','css');
  bindTabs('htmlTabs','html');

  /* ---- 模板切换 ---- */
  $('modeBtn').onclick=function(){
    isTabMode=!isTabMode;
    this.textContent=isTabMode?'单栏':'模板';
    $('cssTabs').classList.toggle('show',isTabMode);
    $('htmlTabs').classList.toggle('show',isTabMode);
    if(isTabMode){
      cssTabData.custom=cssInput.value;
      htmlTabData.custom=htmlInput.value;
      curCssTab='env';curHtmlTab='env';
      cssInput.value=cssTabData.env;
      htmlInput.value=htmlTabData.env;
      cssInput.placeholder='CSS — 环境……';
      htmlInput.placeholder='HTML — 环境……';
      $('cssTabs').querySelectorAll('.qaq-tab').forEach(function(t){t.classList.toggle('active',t.getAttribute('data-tab')==='env');});
      $('htmlTabs').querySelectorAll('.qaq-tab').forEach(function(t){t.classList.toggle('active',t.getAttribute('data-tab')==='env');});
    } else {
      cssTabData[curCssTab]=cssInput.value;
      htmlTabData[curHtmlTab]=htmlInput.value;
      var allCss='';TAB_KEYS.forEach(function(k){allCss+=cssTabData[k]+'\n';});
      var allHtml='';TAB_KEYS.forEach(function(k){allHtml+=htmlTabData[k];});
      cssInput.value=allCss.trim();
      htmlInput.value=allHtml;
      cssInput.placeholder='在这里贴入 CSS 代码……';
      htmlInput.placeholder='在这里贴入 HTML 文案……';
    }
    render();
  };

  /* ---- 清空 ---- */
  $('clearCssBtn').onclick=function(){
    if(isTabMode){cssTabData[curCssTab]='';cssInput.value='';}
    else cssInput.value='';
    render();
  };
  $('clearHtmlBtn').onclick=function(){
    if(isTabMode){htmlTabData[curHtmlTab]='';htmlInput.value='';}
    else htmlInput.value='';
    render();
  };
  $('clearBtn').onclick=function(){
    if(isTabMode){
      TAB_KEYS.forEach(function(k){cssTabData[k]='';htmlTabData[k]='';});
      cssInput.value='';htmlInput.value='';
    } else {
      cssInput.value='';htmlInput.value='';
    }
    render();
  };

  /* ---- 须知 ---- */
  $('noticeBtn').onclick=function(){
    noticeOpen=!noticeOpen;
    $('notice').classList.toggle('open',noticeOpen);
    this.textContent=noticeOpen?'收起':'须知';
  };

  /* ---- 主题 ---- */
  $('themeBtn').onclick=function(){
    isDark=!isDark;
    document.documentElement.setAttribute('data-theme',isDark?'dark':'');
    this.textContent=isDark?'日间':'夜间';
  };

  /* ---- 展开 ---- */
  function toggleExpand(ta,btn){
    var on=ta.classList.toggle('expanded');
    btn.textContent=on?'收起':'展开';
    if(on){ta.scrollIntoView({behavior:'smooth',block:'start'});ta.focus();}
  }
  $('expandCssBtn').onclick=function(){toggleExpand(cssInput,this);};
  $('expandHtmlBtn').onclick=function(){toggleExpand(htmlInput,this);};

  /* ---- 预设存取 ---- */
  function presetKey(type,tab){
    return tab?'qaq_presets_'+type+'_'+tab:KEYS[type];
  }
  function loadPresets(type,tab){
    try{return JSON.parse(localStorage.getItem(presetKey(type,tab)))||[];}
    catch(e){return[];}
  }
  function savePresetsLS(type,tab,list){
    localStorage.setItem(presetKey(type,tab),JSON.stringify(list));
  }
  function fmtDate(ts){
    var d=new Date(ts);
    return(d.getMonth()+1)+'/'+d.getDate()+' '+
      String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }

  /* ---- 弹窗通用 ---- */
  function openOverlay(id){$(id).classList.add('active');}
  function closeOverlay(id){$(id).classList.remove('active');}
  $('saveCloseBtn').onclick=function(){closeOverlay('saveOverlay');};
  $('importCloseBtn').onclick=function(){closeOverlay('importOverlay');};
  $('saveOverlay').onclick=function(e){if(e.target===this)closeOverlay('saveOverlay');};
  $('importOverlay').onclick=function(e){if(e.target===this)closeOverlay('importOverlay');};

  /* ---- 保存弹窗 ---- */
  function getSaveOptions(){
    var opts=[];
    if(isTabMode){
      opts.push({type:'css',tab:curCssTab,label:'保存 CSS·'+TAB_NAMES[curCssTab]+' 预设',desc:'保存当前 CSS '+TAB_NAMES[curCssTab]+' 内容'});
      opts.push({type:'html',tab:curHtmlTab,label:'保存 HTML·'+TAB_NAMES[curHtmlTab]+' 预设',desc:'保存当前 HTML '+TAB_NAMES[curHtmlTab]+' 内容'});
    } else {
      opts.push({type:'css',tab:null,label:'保存 CSS 预设',desc:'将当前 CSS 输入框内容保存为预设'});
      opts.push({type:'html',tab:null,label:'保存 HTML 预设',desc:'将当前 HTML 输入框内容保存为预设'});
    }
    return opts;
  }

  $('saveBtn').onclick=function(){
    var opts=getSaveOptions();
    $('saveModalTitle').textContent='保存预设';
    var h='';
    opts.forEach(function(o,i){
      h+='<button class="qaq-option-btn" data-si="'+i+'"><b>'+o.label+'</b><span>'+o.desc+'</span></button>';
    });
    $('saveModalBody').innerHTML=h;
    openOverlay('saveOverlay');
    $('saveModalBody').querySelectorAll('.qaq-option-btn').forEach(function(btn){
      btn.onclick=function(){
        var o=opts[parseInt(this.getAttribute('data-si'))];
        openSaveStep2(o.type,o.tab);
      };
    });
  };

  function openSaveStep2(type,tab){
    var ta=type==='css'?cssInput:htmlInput;
    var title=tab?'CSS·'+TAB_NAMES[tab]:'';
    $('saveModalTitle').textContent='命名预设';
    $('saveModalBody').innerHTML=
      '<input class="qaq-modal-input" id="_saveName" placeholder="输入预设名称……" maxlength="30">'+
      '<div class="qaq-modal-footer">'+
        '<button class="qaq-btn" id="_saveBack">返回</button>'+
        '<button class="qaq-btn" id="_saveConfirm">保存</button>'+
      '</div>';
    $('_saveName').focus();
    $('_saveBack').onclick=function(){$('saveBtn').onclick();};
    $('_saveConfirm').onclick=function(){
      var name=$('_saveName').value.trim();
      if(!name)return;
      var list=loadPresets(type,tab);
      list.unshift({name:name,content:ta.value,ts:Date.now()});
      savePresetsLS(type,tab,list);
      closeOverlay('saveOverlay');
    };
  }

  /* ---- 导入弹窗 ---- */
  function openImport(type){
    var tab=null;
    if(isTabMode) tab=type==='css'?curCssTab:curHtmlTab;
    var ta=type==='css'?cssInput:htmlInput;
    var label=type==='css'?'CSS':'HTML';
    if(tab) label+='·'+TAB_NAMES[tab];
    $('importModalTitle').textContent='导入 '+label+' 预设';
    renderImportList(type,tab,ta);
    openOverlay('importOverlay');
  }

  function renderImportList(type,tab,ta){
    var list=loadPresets(type,tab);
    var body=$('importModalBody');
    if(!list.length){
      body.innerHTML='<div class="qaq-preset-empty">暂无保存的预设</div>';
      return;
    }
    var h='<div class="qaq-preset-list">';
    list.forEach(function(item,i){
      h+='<div class="qaq-preset-item">'+
        '<div style="flex:1;min-width:0">'+
          '<div class="qaq-preset-name">'+item.name+'</div>'+
          '<div class="qaq-preset-date">'+fmtDate(item.ts)+'</div>'+
        '</div>'+
        '<div class="qaq-preset-actions">'+
          '<button class="qaq-btn" data-i="'+i+'" data-act="load">导入</button>'+
          '<button class="qaq-btn" data-i="'+i+'" data-act="del">删除</button>'+
        '</div></div>';
    });
    h+='</div>';
    body.innerHTML=h;
    body.querySelectorAll('.qaq-btn[data-act]').forEach(function(btn){
      btn.onclick=function(){
        var idx=parseInt(this.getAttribute('data-i'));
        var act=this.getAttribute('data-act');
        var list=loadPresets(type,tab);
        if(act==='load'){
          ta.value=list[idx].content;
          if(isTabMode){
            if(type==='css') cssTabData[tab||curCssTab]=ta.value;
            else htmlTabData[tab||curHtmlTab]=ta.value;
          }
          render();
          closeOverlay('importOverlay');
        } else {
          list.splice(idx,1);
          savePresetsLS(type,tab,list);
          renderImportList(type,tab,ta);
        }
      };
    });
  }

  $('importCssBtn').onclick=function(){openImport('css');};
  $('importHtmlBtn').onclick=function(){openImport('html');};

  /* ---- 气泡弹窗 ---- */
  $('bubbleBtn').onclick=function(){openOverlay('bubbleOverlay');};
  $('bubbleCloseBtn').onclick=function(){closeOverlay('bubbleOverlay');};
  $('bubbleOverlay').onclick=function(e){if(e.target===this)closeOverlay('bubbleOverlay');};

  function hexToRgb(hex){
    var r=parseInt(hex.slice(1,3),16);
    var g=parseInt(hex.slice(3,5),16);
    var b=parseInt(hex.slice(5,7),16);
    return{r:r,g:g,b:b};
  }

  function updateBubble(){
    var bgC=hexToRgb($('bblBgColor').value);
    var bgA=parseInt($('bblBgAlpha').value)/100;
    var bdC=hexToRgb($('bblBdColor').value);
    var bdW=parseFloat($('bblBdWidth').value);
    var bdA=parseInt($('bblBdAlpha').value)/100;
    var custom=$('bblCustomCss').value;

    $('bblBgAlphaVal').textContent=$('bblBgAlpha').value;
    $('bblBdWidthVal').textContent=$('bblBdWidth').value;
    $('bblBdAlphaVal').textContent=$('bblBdAlpha').value;

    var css='.message-bubble{background:rgba('+bgC.r+','+bgC.g+','+bgC.b+','+bgA+')!important;';
    if(bdW>0) css+='border:'+bdW+'px solid rgba('+bdC.r+','+bdC.g+','+bdC.b+','+bdA+')!important;';
    else css+='border:none!important;';
    css+='}\n'+custom;
    bubbleStyle.textContent=css;
  }

  ['bblBgColor','bblBgAlpha','bblBdColor','bblBdWidth','bblBdAlpha'].forEach(function(id){
    $(id).addEventListener('input',updateBubble);
  });
  $('bblCustomCss').addEventListener('input',updateBubble);

  $('bblResetBtn').onclick=function(){
    $('bblBgColor').value=isDark?'#222220':'#edecea';
    $('bblBgAlpha').value='100';
    $('bblBdColor').value=isDark?'#3a3a38':'#d8d6d0';
    $('bblBdWidth').value='0';
    $('bblBdAlpha').value='100';
    $('bblCustomCss').value='';
    bubbleStyle.textContent='';
    updateBubble();
  };

  /* ---- 范例 ---- */
  $('exampleBtn').onclick=function(){
    if(isTabMode){$('modeBtn').onclick();}
    cssInput.value='.message-bubble div {\n  background: none !important;\n  border: none !important;\n  padding: 0 !important;\n  margin: 0 !important;\n  box-shadow: none !important;\n}\n.message-bubble div p {\n  margin: 0 0 1em 0 !important;\n  padding: 0 !important;\n  color: #2c2b28 !important;\n  line-height: 1.8 !important;\n}\n.message-bubble div p:last-child {\n  margin-bottom: 0 !important;\n}\n.message-bubble div p strong {\n  display: block !important;\n  font-weight: 700 !important;\n  color: #1a1a18 !important;\n}\n.message-bubble div p em {\n  display: block !important;\n  font-style: italic !important;\n  color: #8a8880 !important;\n  line-height: 1.7 !important;\n}';
    htmlInput.value='<div><p>傍晚的光从落地窗倾泻进来，把客厅染成一整片琥珀色。空气里浮着刚煮好的咖啡的味道，苦涩的，温热的。</p><p><em>写不出来。脑子里明明有很多话，落到指尖就全散了。</em></p><p>门口传来一阵窸窣声。她没有回头，但耳朵已经竖起来了。</p><p><strong>\u201c还在写？\u201d</strong></p><p><strong>\u201c嗯。\u201d</strong></p><p><em>才不是。其实一个字都没写。一直在等你开门的声音。</em></p><p>他走过来，弯下腰从背后看了一眼屏幕，然后把一杯热可可放在她手边。陶杯贴着桌面滑过去的声音很轻，像一个不打算被接住的问句。</p><p><strong>\u201c空白文档也要盯这么久？\u201d</strong></p><p>她把脸埋进膝盖里，耳朵尖红了一小片。</p><p><strong>\u201c……你没看到。\u201d</strong></p><p><em>被发现了。好丢人。但是可可很暖。</em></p><p>他笑了一声，很轻，像纸页被风翻过去的声音。窗外的路灯次第亮起来，橘色的光晕把夜色推得很远很远。</p></div>';
    render();
  };

}());
</script>
</body>
</html>
